<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- Critical: disable user scaling so our pinch-to-zoom is native on the canvas -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <title>InkFlow Mobile – Draw Anywhere</title>
  <meta name="description" content="InkFlow Mobile – a beautiful, touch-first whiteboard and diagram tool." />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./mobile.css" />
</head>

<body>
  <div id="app">

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- Infinite Canvas Container (fills full screen behind all UI) -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <div id="canvas-container"></div>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- TOP BAR — minimal, left: logo, right: actions              -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <header id="top-bar">
      <!-- Logo / Title -->
      <div class="top-bar-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.53 16.122A3 3 0 00.22 17.5l.078.411A9.017 9.017 0 005.158 20.314m0-4.192a8.004 8.004 0 0113.684-6.129M18.842 10.015a9.01 9.01 0 01-4.159 4.159m-4.159-4.159a4.5 4.5 0 00-6.259 6.259" />
        </svg>
        <span class="brand-name">InkFlow</span>
      </div>

      <!-- Top right actions -->
      <div class="top-bar-actions">
        <!-- Export PNG -->
        <button id="btn-export-png" class="top-action-btn" title="Export PNG" aria-label="Export as PNG">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
            </path>
          </svg>
        </button>

        <!-- Dark Mode Toggle -->
        <button id="btn-theme-toggle" class="top-action-btn" title="Toggle Dark Mode" aria-label="Toggle dark mode">
          <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
          </svg>
          <svg id="theme-icon-moon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- ZOOM PILL — top-center, subtle zoom indicator + controls   -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <div id="zoom-pill">
      <button id="btn-zoom-out" class="zoom-btn" aria-label="Zoom out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" />
        </svg>
      </button>
      <span id="zoom-display">100%</span>
      <button id="btn-zoom-in" class="zoom-btn" aria-label="Zoom in">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
      </button>
    </div>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- BOTTOM TOOLBAR — scrollable pill at the bottom             -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <nav id="bottom-toolbar" role="toolbar" aria-label="Drawing Tools">
      <div id="toolbar-scroll">

        <!-- Select -->
        <button id="tool-select" class="tool-btn active-tool" data-tool="select" aria-label="Select tool" title="Select">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.042 21.672L13.684 16.6m0 0l-2.51 2.225.569-9.47 7.827 5.34-5.886 1.905zm-3.083-7.074c-.947-.947-2.513-.947-3.46 0L2.83 20.267"></path>
          </svg>
          <span class="tool-label">Select</span>
        </button>

        <div class="tool-divider"></div>

        <!-- Rectangle -->
        <button id="tool-rectangle" class="tool-btn" data-tool="rectangle" aria-label="Rectangle tool" title="Rectangle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 5h16v14H4z"></path>
          </svg>
          <span class="tool-label">Rect</span>
        </button>

        <!-- Circle -->
        <button id="tool-circle" class="tool-btn" data-tool="circle" aria-label="Circle tool" title="Circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9" stroke-linecap="round" stroke-linejoin="round"></circle>
          </svg>
          <span class="tool-label">Circle</span>
        </button>

        <!-- Diamond -->
        <button id="tool-diamond" class="tool-btn" data-tool="diamond" aria-label="Diamond tool" title="Diamond">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2l9 10-9 10-9-10z"></path>
          </svg>
          <span class="tool-label">Diamond</span>
        </button>

        <!-- Line -->
        <button id="tool-line" class="tool-btn" data-tool="line" aria-label="Line tool" title="Line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 19L19 5"></path>
          </svg>
          <span class="tool-label">Line</span>
        </button>

        <!-- Arrow -->
        <button id="tool-arrow" class="tool-btn" data-tool="arrow" aria-label="Arrow tool" title="Arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
          </svg>
          <span class="tool-label">Arrow</span>
        </button>

        <div class="tool-divider"></div>

        <!-- Pen -->
        <button id="tool-pen" class="tool-btn" data-tool="pen" aria-label="Pen tool" title="Pen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
          </svg>
          <span class="tool-label">Pen</span>
        </button>

        <!-- Text -->
        <button id="tool-text" class="tool-btn" data-tool="text" aria-label="Text tool" title="Text">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"></path>
          </svg>
          <span class="tool-label">Text</span>
        </button>

        <div class="tool-divider"></div>

        <!-- Laser -->
        <button id="tool-laser" class="tool-btn laser-btn" data-tool="laser" aria-label="Laser pointer" title="Laser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="3" fill="currentColor"></circle>
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2v3m0 14v3M2 12h3m14 0h3"></path>
          </svg>
          <span class="tool-label">Laser</span>
        </button>

      </div>
    </nav>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- PROPERTIES BOTTOM SHEET — slides up when shape selected    -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <div id="props-sheet-backdrop" class="sheet-backdrop hidden" aria-hidden="true"></div>
    <div id="props-sheet" class="bottom-sheet" role="dialog" aria-label="Shape Properties" aria-hidden="true">
      <!-- Drag Handle -->
      <div class="sheet-handle-area" id="sheet-handle-area">
        <div class="sheet-handle"></div>
      </div>

      <!-- Sheet Header -->
      <div class="sheet-header">
        <h2 class="sheet-title">Properties</h2>
        <button id="btn-close-sheet" class="sheet-close-btn" aria-label="Close properties">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Sheet Body — scrollable -->
      <div class="sheet-body">

        <!-- Stroke Color -->
        <section class="prop-section">
          <h3 class="prop-label">Stroke Color</h3>
          <div id="mobile-stroke-palette" class="color-palette"></div>
          <div class="custom-color-row">
            <input id="mobile-stroke-custom" type="color" class="custom-color-input" title="Custom stroke color" aria-label="Custom stroke color" />
            <span class="custom-color-label">Custom stroke</span>
          </div>
        </section>

        <!-- Fill Color -->
        <section class="prop-section">
          <h3 class="prop-label">Fill Color</h3>
          <div id="mobile-fill-palette" class="color-palette"></div>
          <div class="custom-color-row">
            <input id="mobile-fill-custom" type="color" class="custom-color-input" title="Custom fill color" aria-label="Custom fill color" />
            <span class="custom-color-label">Custom fill</span>
          </div>
        </section>

        <!-- Stroke Width -->
        <section class="prop-section">
          <h3 class="prop-label">Stroke Width</h3>
          <div id="mobile-stroke-width-group" class="btn-group">
            <button class="btn-group-item" data-val="2">Thin</button>
            <button class="btn-group-item active-group-item" data-val="4">Medium</button>
            <button class="btn-group-item" data-val="6">Thick</button>
          </div>
        </section>

        <!-- Stroke Style -->
        <section class="prop-section">
          <h3 class="prop-label">Stroke Style</h3>
          <div id="mobile-stroke-style-group" class="btn-group">
            <button class="btn-group-item active-group-item" data-val="solid">Solid</button>
            <button class="btn-group-item" data-val="dashed">Dashed</button>
            <button class="btn-group-item" data-val="dotted">Dotted</button>
          </div>
        </section>

        <!-- Delete Shape -->
        <section class="prop-section">
          <button id="btn-delete-shape" class="danger-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            Delete Shape
          </button>
        </section>

        <!-- Safe area bottom spacer -->
        <div class="sheet-safe-bottom"></div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- TOAST NOTIFICATION — brief feedback messages               -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  </div><!-- /#app -->

  <script type="module" src="./mobile.js"></script>
</body>

</html>
